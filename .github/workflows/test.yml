name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: build & unit test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go mod download
      - name: normalizer unit tests
        run: python3 scripts/openapi_normalize_test.py
      - name: gofmt
        run: |
          fmtout="$(gofmt -l main.go internal/)"
          if [ -n "$fmtout" ]; then
            echo "These files need gofmt:"; echo "$fmtout"; exit 1
          fi
      - name: go vet
        run: go vet ./...
      - name: build
        run: go build ./...
      - name: unit tests
        run: go test ./... -count=1
