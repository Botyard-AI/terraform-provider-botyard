name: Release

# Releases are cut MANUALLY (workflow_dispatch), not on every push to main, so
# multiple merges batch into one deliberate, semver-tagged release. Choose a
# bump level (or pass an explicit version); the workflow derives the next
# vX.Y.Z from the latest tag, creates + pushes the tag, and runs GoReleaser to
# build, GPG-sign, and publish the GitHub release the Terraform Registry ingests.
#
# Re-run safety: if a run fails after the tag is pushed, re-dispatching the same
# commit resumes it. The dispatched commit's own release tag is detected and
# reused (instead of bumping past it), an existing tag is accepted only when it
# points at the dispatched commit, and the run fails closed unless the releases
# API positively confirms (404) that no release exists yet.
#
# Third-party actions are pinned to full commit SHAs (supply-chain: the GPG
# signing key + passphrase are exposed to the import step).
on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Semver bump for the next release"
        type: choice
        options: [patch, minor, major]
        default: patch
        required: true
      version:
        description: "Explicit version override, e.g. v0.1.0 (overrides bump when set)"
        type: string
        required: false

permissions:
  contents: write # create tags and the GitHub release

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0 # full history + tags for version derivation

      - name: Determine version
        id: version
        env:
          BUMP: ${{ inputs.bump }}
          OVERRIDE: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
          RELEASES_API: ${{ github.api_url }}/repos/${{ github.repository }}/releases
        run: |
          set -euo pipefail
          git fetch --tags --force

          # Strict semver: no pre-release/build-metadata (v1.2.3-rc1, v1.2.3+meta),
          # no junk (v1.2.foo), and NO leading-zero components (v1.09.0 — which
          # would also break base-10 arithmetic below).
          semver='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'

          # If the dispatched commit already carries a release tag, a prior run
          # tagged it but did not finish. Resume that exact version instead of
          # bumping — otherwise a same-input re-dispatch would treat the stranded
          # tag as "latest" and mint an unintended next version.
          tag_on_head="$(git tag --points-at "$GITHUB_SHA" | grep -E "$semver" | sort -V | tail -n1 || true)"

          if [ -n "$OVERRIDE" ]; then
            next="$OVERRIDE"
          elif [ -n "$tag_on_head" ]; then
            next="$tag_on_head"
            echo "Dispatched commit is already tagged $next; resuming that release."
          else
            latest="$(git tag -l | grep -E "$semver" | sort -V | tail -n1 || true)"
            if [ -z "$latest" ]; then
              next="v0.1.0" # first release
            else
              ver="${latest#v}"
              major="${ver%%.*}"; rest="${ver#*.}"; minor="${rest%%.*}"; patch="${rest#*.}"
              # 10# forces base-10 so a stray leading zero never triggers octal errors.
              case "$BUMP" in
                major) major=$((10#$major + 1)); minor=0; patch=0 ;;
                minor) minor=$((10#$minor + 1)); patch=0 ;;
                patch) patch=$((10#$patch + 1)) ;;
                *) echo "Unknown bump: $BUMP" >&2; exit 1 ;;
              esac
              next="v${major}.${minor}.${patch}"
            fi
          fi

          if ! printf '%s' "$next" | grep -Eq "$semver"; then
            echo "Invalid version '$next' (expected vMAJOR.MINOR.PATCH, no leading zeros)" >&2; exit 1
          fi

          # An existing tag is valid only when it points at the dispatched commit.
          resume=false
          if git rev-parse -q --verify "refs/tags/$next" >/dev/null; then
            existing="$(git rev-list -n1 "refs/tags/$next")"
            if [ "$existing" != "$GITHUB_SHA" ]; then
              echo "Tag $next already exists on $existing, not the dispatched commit $GITHUB_SHA." >&2
              exit 1
            fi
            resume=true
            echo "Tag $next already exists on the dispatched commit; resuming."
          fi

          # Never clobber a published release. Fail closed unless the API
          # positively confirms (404) that no release exists for this version.
          code="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "$RELEASES_API/tags/$next")"
          case "$code" in
            404) : ;; # no release yet — good
            200) echo "A GitHub release for $next already exists; refusing to clobber." >&2; exit 1 ;;
            *) echo "Unexpected HTTP $code checking for an existing $next release; failing closed." >&2; exit 1 ;;
          esac

          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "resume=$resume" >> "$GITHUB_OUTPUT"
          echo "Releasing $next from ${GITHUB_SHA:0:7} (resume=$resume)"

      - name: Create and push tag
        if: steps.version.outputs.resume == 'false'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

      - name: Set up Go
        uses: actions/setup-go@3041bf56c941b39c61721a86cd11f3bb1338122a # v5.2.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@cb9bde2e2525e640591a934b1fd28eef1dcaf5e5 # v6.2.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PASSPHRASE }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9ed2f89a662bf1735a48bc8557fd212fa902bebf # v6.1.0
        with:
          version: "2.17.0"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
